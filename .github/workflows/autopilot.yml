name: Shadow Autopilot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # optional daily run – remove if you want only manual

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run bot
        env:
          TEMP_MAIL_URL: https://www.guerrillamail.com/
          TARGET_URL: https://app.reve.com/
          TARGET_NAME: reve
          ACCOUNT_COUNT: 5   # 👈 Change this number to how many accounts you want
        run: python autopilot.py

      - name: Upload artifacts (screenshots + credentials)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accounts-and-screenshots
          path: |
            screenshots/
            *.txt
          retention-days: 3
